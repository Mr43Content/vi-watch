name: Update GTA 6 News

on:
  schedule:
    - cron: "0 6 * * *"   # taeglich 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest news
        run: python scripts/fetch_news.py

      - name: Commit changes if any
        run: |
          git config user.name "vi-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "Auto-Update: GTA 6 News"
          git push
